name: Deploy Backstage to Cloud Run

on:
  push:
    branches:
      - feature/security-scan
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  GAR_LOCATION: ${{ secrets.GCP_REGION }}
  GAR_REPOSITORY: backstage
  SERVICE_NAME: ${{ secrets.CLOUD_RUN_SERVICE }}
  IMAGE_NAME: backstage

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Lint
        run: yarn lint:all

      - name: Test
        run: yarn test --watch=false

      - name: Build backend
        run: yarn build:backend

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - run: yarn install --immutable
      - name: Audit dependencies
        run: yarn npm audit --severity high
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '0'
      - name: Run ESLint security checks
        run: yarn lint:all

  deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/feature/cloud-run-cicd' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Build backend
        run: yarn build:backend

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${GAR_REPOSITORY}" \
            --location="${GAR_LOCATION}" \
          || gcloud artifacts repositories create "${GAR_REPOSITORY}" \
            --repository-format=docker \
            --location="${GAR_LOCATION}" \
            --description="Backstage Docker images"

      - name: Build Docker image
        run: |
          docker build . \
            --file packages/backend/Dockerfile \
            --tag "${GAR_LOCATION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}" \
            --tag "${GAR_LOCATION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/${IMAGE_NAME}:latest"

      - name: Push Docker image
        run: |
          docker push "${GAR_LOCATION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}"
          docker push "${GAR_LOCATION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/${IMAGE_NAME}:latest"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${GAR_LOCATION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="${GAR_LOCATION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=7007 \
            --set-env-vars="NODE_ENV=production,BACKSTAGE_BASE_URL=${{ secrets.BACKSTAGE_BASE_URL }},POSTGRES_HOST=${{ secrets.POSTGRES_HOST }},POSTGRES_PORT=${{ secrets.POSTGRES_PORT }},POSTGRES_USER=${{ secrets.POSTGRES_USER }}" \
            --set-secrets="POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_SECRET_NAME }}:latest"
